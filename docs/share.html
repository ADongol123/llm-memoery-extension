<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>LLM Memory — Shared Conversation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    .page {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    .brand-logo { font-size: 18px; }
    .brand a { color: #7c6fbf; text-decoration: none; }
    .brand a:hover { color: #a78bfa; }

    .conv-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .conv-title {
      font-size: 22px;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.3;
    }
    .conv-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      flex-wrap: wrap;
    }
    .platform-badge {
      background: #1e1e2e;
      color: #a78bfa;
      border: 1px solid #3f3f5a;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Privacy notice ── */
    .privacy-notice {
      background: #0d1f12;
      border: 1px solid #1a4027;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 9px 18px;
      transition: opacity 0.12s;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary { background: #6d28d9; color: #fff; }
    .btn-secondary {
      background: #1e1e2e;
      color: #c4b5fd;
      border: 1px solid #3f3f5a;
    }
    .btn-copied { background: #052e16; color: #4ade80; border: 1px solid #166534; }

    /* ── Conversation ── */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .message-role {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .message.user .message-role { color: #7c6fbf; }
    .message.assistant .message-role { color: #3a8a5c; }
    .message.system .message-role { color: #666; }

    .message-body {
      background: #18181f;
      border: 1px solid #2e2e42;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      color: #ddd;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-body {
      background: #1a1530;
      border-color: #3a2d6a;
    }
    .message.system .message-body {
      background: transparent;
      border: 1px dashed #2e2e42;
      color: #555;
      font-style: italic;
      font-size: 12px;
    }

    /* ── Footer ── */
    .page-footer {
      font-size: 12px;
      color: #444;
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid #1e1e2e;
    }
    .page-footer a { color: #6d28d9; text-decoration: none; }
    .page-footer a:hover { color: #a78bfa; }

    /* ── Error / Loading ── */
    .center-msg {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 15px;
    }
    .center-msg .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="page" id="app">
    <div class="center-msg" id="loading">
      <div class="icon">⏳</div>
      Decoding conversation…
    </div>
  </div>

  <script>

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function buildPromptText(data) {
      const lines = data.messages.map(m => {
        if (m.role === 'system') return m.content;
        return `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`;
      }).join('\n\n');
      return `[Shared conversation from ${data.platform} — ${data.timestamp}]\n\n${lines}\n\n[Please acknowledge you've read this context and continue from here.]`;
    }

    function render(data) {
      const app = document.getElementById('app');

      const promptText = buildPromptText(data);

      app.innerHTML = `
        <div class="brand">
          <span class="brand-logo">🧠</span>
          <span>LLM Memory</span>
        </div>

        <div class="conv-header">
          <div class="conv-title">${esc(data.title)}</div>
          <div class="conv-meta">
            <span class="platform-badge">${esc(data.platform)}</span>
            <span>${esc(data.timestamp)}</span>
            <span>·</span>
            <span>${data.messages.length} messages</span>
          </div>
        </div>

        <div class="privacy-notice">
          🔒 This conversation is encoded in the URL — it never touched any server.
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="copyPromptBtn">Copy as prompt</button>
          <button class="btn btn-secondary" id="copyLinkBtn">Copy this link</button>
        </div>

        <div class="conversation" id="conversation"></div>

        <div class="page-footer">
          Shared via <a href="https://github.com/aayushdongol/llm-memoery-extension" target="_blank">LLM Memory</a>
          · No data was sent to any server
        </div>
      `;

      // Render messages
      const conv = document.getElementById('conversation');
      data.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = `message ${m.role}`;
        div.innerHTML = `
          <div class="message-role">${m.role === 'system' ? '' : m.role}</div>
          <div class="message-body">${esc(m.content)}</div>
        `;
        conv.appendChild(div);
      });

      // Copy prompt button
      const copyPromptBtn = document.getElementById('copyPromptBtn');
      copyPromptBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(promptText).then(() => {
          copyPromptBtn.textContent = 'Copied!';
          copyPromptBtn.className = 'btn btn-copied';
          setTimeout(() => {
            copyPromptBtn.textContent = 'Copy as prompt';
            copyPromptBtn.className = 'btn btn-primary';
          }, 2000);
        });
      });

      // Copy link button
      const copyLinkBtn = document.getElementById('copyLinkBtn');
      copyLinkBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(location.href).then(() => {
          copyLinkBtn.textContent = 'Copied!';
          setTimeout(() => { copyLinkBtn.textContent = 'Copy this link'; }, 2000);
        });
      });
    }

    function showError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="center-msg">
          <div class="icon">⚠️</div>
          ${esc(msg)}
        </div>
      `;
    }

    // Decode on load
    (function init() {
      const hash = location.hash.slice(1);
      if (!hash) {
        showError('No conversation data found in this URL.');
        return;
      }
      try {
        const json = LZString.decompressFromEncodedURIComponent(hash);
        if (!json) throw new Error('decompression failed');
        const data = JSON.parse(json);
        if (!data.messages || !Array.isArray(data.messages)) throw new Error('invalid format');
        render(data);
      } catch (_) {
        showError('This link appears to be invalid or corrupted.');
      }
    })();
  </script>
</body>
</html>
