<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Memory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="logo-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="1.6"/>
              <path d="M8 12h8M12 8v8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="title">LLM Memory</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleInput" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>

      <!-- Status -->
      <div class="status-row">
        <span id="statusDot" class="dot dot-off"></span>
        <span id="statusText" class="status-text">Picker is off</span>
        <span id="countBadge" class="count-badge hidden"></span>
      </div>

      <!-- Off state -->
      <div id="offState" class="off-state">
        Toggle on — then open any AI chat to continue conversations from Claude, ChatGPT, Grok, and more.
      </div>

      <!-- Main panel -->
      <div id="mainPanel" class="hidden">

        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" class="search-input" placeholder="Search conversations…" autocomplete="off" />
          <button id="clearSearch" class="search-clear hidden">×</button>
        </div>

        <!-- Tabs -->
        <div id="tabBar" class="tab-bar"></div>

        <!-- Inject mode -->
        <div class="mode-row">
          <span class="mode-label">Inject as</span>
          <div class="mode-pills">
            <button id="modeFullBtn"    class="mode-pill active">Full</button>
            <button id="modeSummaryBtn" class="mode-pill">Summary</button>
          </div>
        </div>

        <!-- Conversation list -->
        <div id="convList" class="conv-list">
          <div class="loading-wrap">
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </div>

        <!-- Bottom row -->
        <div class="bottom-row">
          <button id="randomBtn" class="btn-random">↻  Pick random</button>
        </div>

      </div>

      <!-- Toast -->
      <div id="toast" class="toast hidden"></div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
