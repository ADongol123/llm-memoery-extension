<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Memory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-left">
          <span class="logo">🧠</span>
          <div>
            <div class="title">LLM Memory</div>
            <div id="platformBadge" class="platform-badge hidden"></div>
          </div>
        </div>
        <button id="saveBtn" class="btn btn-primary btn-sm">+ Save</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="memoryList" class="memory-list"></div>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">💬</div>
        <div class="empty-text">No memories saved yet.</div>
        <div class="empty-sub">Open an AI chat and click + Save.</div>
      </div>

      <div id="footer" class="footer hidden">
        <button id="clearAllBtn" class="btn btn-ghost btn-sm">Clear all</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
