<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Memory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">🧠 LLM Memory</h1>
      <p class="subtitle">Save context. Switch freely.</p>

      <div class="button-group">
        <button id="saveBtn" class="btn btn-primary">💾 Save Context</button>
        <button id="generateBtn" class="btn btn-secondary">📋 Copy Briefing</button>
        <button id="clearBtn" class="btn btn-danger">🗑 Clear Memory</button>
      </div>

      <div id="status" class="status hidden"></div>
      <div id="preview" class="preview hidden"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
