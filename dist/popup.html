<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Memory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="logo-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9-4-9-9-9z" stroke="#fff" stroke-width="1.5"/>
              <path d="M12 8v4l3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="title">LLM Memory</span>
        </div>
        <label class="toggle" title="Enable conversation picker">
          <input type="checkbox" id="toggleInput" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <!-- Status -->
      <div class="status-row">
        <span id="statusDot" class="dot dot-off"></span>
        <span id="statusText" class="status-text">Picker is off</span>
      </div>

      <div class="divider"></div>

      <!-- Recent conversations section (shown when on an LLM tab) -->
      <div id="recentSection" class="hidden">
        <div class="section-header">
          <span id="platformLabel" class="section-label">Recent conversations</span>
          <button id="randomBtn" class="btn-ghost">↻ Random</button>
        </div>
        <div id="convList" class="conv-list"></div>
        <div id="loadingState" class="loading-state hidden">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Idle / off state -->
      <div id="idleState" class="idle-state">
        <div class="idle-desc">
          Toggle on, then open any AI chat — the last 5 conversations will appear here so you can pick up where you left off.
        </div>
      </div>

      <!-- Toast -->
      <div id="toast" class="toast hidden"></div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
