<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Memory</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="logo">🧠</span>
          <div>
            <div class="title">LLM Memory</div>
            <div id="platformBadge" class="platform-badge hidden"></div>
          </div>
        </div>
        <div class="header-actions">
          <button id="exportBtn" class="btn-icon" title="Export memories (JSON)">⬇</button>
          <label class="btn-icon" title="Import memories (JSON)" style="cursor:pointer;display:inline-flex;align-items:center;">
            ⬆<input type="file" id="importInput" accept=".json" style="display:none" />
          </label>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" class="search-input" placeholder="Search memories…" type="text" autocomplete="off" />
      </div>

      <!-- Workspace filter -->
      <div id="workspaceTabs" class="workspace-tabs"></div>

      <!-- Status toast -->
      <div id="status" class="status hidden"></div>

      <!-- Pro upgrade banner -->
      <div id="upgradeBanner" class="upgrade-banner hidden">
        <span>Free limit reached (5 memories).</span>
        <a href="https://llmmemory.app/pro" target="_blank" class="upgrade-link">Upgrade to Pro →</a>
      </div>

      <!-- Memory list -->
      <div id="memoryList" class="memory-list"></div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">💬</div>
        <div class="empty-text">No memories yet</div>
        <div class="empty-sub">Open an AI chat and press <kbd>⌘⇧S</kbd> or click Save.</div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button id="saveBtn" class="btn btn-primary">+ Save current</button>
        <div id="analytics" class="analytics"></div>
      </div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
